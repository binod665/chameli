<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chameli Notes - Your Digital Notebook</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f0;
            color: #333;
            min-height: 100vh;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #fafaf5;
            border-right: 1px solid #e8e8e0;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-note-btn {
            width: 100%;
            height: 48px;
            background: #f5c518;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(245, 197, 24, 0.3);
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .new-note-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 197, 24, 0.4);
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            font-size: 14px;
            color: #666;
        }

        .nav-item:hover {
            background: #f0f0ea;
        }

        .nav-item.active {
            background: #fff9e6;
            color: #333;
            font-weight: 500;
            border: 1px solid #f5c518;
        }

        .nav-item span:first-child {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-count {
            font-size: 13px;
            color: #999;
        }

        /* User Section */
        .user-section {
            border-top: 1px solid #e8e8e0;
            padding-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .login-btn {
            padding: 6px 16px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: #555;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 0;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: linear-gradient(to right, #fafaf5, #f5f5f0);
            border-bottom: 1px solid #e8e8e0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 8px 16px;
            width: 280px;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 14px;
            width: 100%;
            background: transparent;
        }

        .search-box input::placeholder {
            color: #999;
        }

        /* Notes Grid */
        .notes-container {
            padding: 24px 32px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #666;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* Note Card */
        .note-card {
            background: #fff9e6;
            border-radius: 16px;
            padding: 20px;
            min-height: 200px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .note-card.blue { background: #e6f3ff; }
        .note-card.pink { background: #ffe6e6; }
        .note-card.green { background: #e6ffe6; }
        .note-card.purple { background: #f0e6ff; }
        .note-card.rose { background: #ffe6f0; }

        .note-card-title {

            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .note-card-content {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
        }

        .note-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .note-card-date {
            font-size: 12px;
            color: #999;
        }

        .note-card-actions {
            display: flex;
            gap: 8px;
        }

        .note-card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
            opacity: 0.6;
        }

        .note-card-actions button:hover {
            opacity: 1;
            background: rgba(0,0,0,0.05);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transform: scale(0.95);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;

        .modal-overlay.active .modal {

        .modal-header {

            background: #fafaf5;

        .modal-date {
            font-size: 13px;
            color: #999;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .modal-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-actions button:hover {
            background: rgba(0,0,0,0.05);

        .save-btn {
            background: #f5c518 !important;
            color: #333;
            font-size: 13px !important;
            font-weight: 600;
            border-radius: 16px !important;
            padding: 6px 16px !important;

        .save-btn:hover {
            background: #e5b500 !important;
        }

        .modal-body {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
        }

        .note-title-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
            background: transparent;
            font-family: inherit;
        }

        .note-title-input::placeholder {
            color: #ccc;
        }

        .note-content-textarea {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            resize: none;
            min-height: 300px;
            background: transparent;
            font-family: inherit;
        }

        .note-content-textarea::placeholder {
            color: #ccc;
        }

        .modal-toolbar {
            display: flex;
            gap: 16px;
            padding: 12px 24px;
            background: #fafaf5;
            border-top: 1px solid #eee;
        }

        .toolbar-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        /* Login Modal */
        .login-modal .modal {
            max-width: 420px;
            text-align: center;
            padding: 40px;
        }

        .login-modal h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .login-modal p {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        .github-btn {
            width: 100%;
            padding: 14px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;

            cursor: pointer;

            align-items: center;
            justify-content: center;
            gap: 10px;

            margin-bottom: 16px;
        }

        .github-btn:hover {
            background: #555;
        }

        .guest-link {
            font-size: 14px;
            color: #f5c518;
            cursor: pointer;
            font-weight: 500;

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;

            box-shadow: 0 4px 16px rgba(0,0,0,0.2);

        }

        .toast.show {

        /* Loading Spinner */
        .spinner {
            width: 20px;

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">📝 Chameli Notes</div>

            <button class="new-note-btn" onclick="openEditor()">
                <span>+</span> New Note
            </button>

            <nav class="nav-menu">
                <div class="nav-item active" onclick="filterNotes('all')">
                    <span>📋 All Notes</span>
                    <span class="nav-count" id="allCount">0</span>
                </div>
                <div class="nav-item" onclick="filterNotes('favorites')">
                    <span>⭐ Favorites</span>
                    <span class="nav-count" id="favCount">0</span>
                </div>
                <div class="nav-item" onclick="filterNotes('trash')">
                    <span>🗑️ Trash</span>
                    <span class="nav-count" id="trashCount">0</span>
                </div>
            </nav>

            <div class="user-section">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-info">
                    <div class="user-name" id="userName">Guest User</div>
                    <div class="user-email" id="userEmail">Login to sync notes</div>
                </div>
                <button class="login-btn" id="loginBtn" onclick="toggleLogin()">Login</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">All Notes</h1>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search notes..." id="searchInput" oninput="searchNotes(this.value)">
                </div>
            </div>

            <div class="notes-container" id="notesContainer">
                <div class="empty-state">
                    <div class="icon">📝</div>
                    <h3>No notes yet</h3>
                    <p>Click "New Note" to get started</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Note Editor Modal -->
    <div class="modal-overlay" id="editorModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-date" id="editorDate">Jul 22, 2026</span>
                <div class="modal-actions">
                    <div class="color-picker">
                        <div class="color-dot color-yellow active" onclick="setNoteColor('yellow')" data-color="yellow"></div>
                        <div class="color-dot color-blue" onclick="setNoteColor('blue')" data-color="blue"></div>
                        <div class="color-dot color-pink" onclick="setNoteColor('pink')" data-color="pink"></div>
                        <div class="color-dot color-green" onclick="setNoteColor('green')" data-color="green"></div>
                        <div class="color-dot color-purple" onclick="setNoteColor('purple')" data-color="purple"></div>
                    </div>
                    <button onclick="deleteCurrentNote()" title="Delete">🗑️</button>
                    <button class="save-btn" onclick="saveNote()">Save</button>
                    <button onclick="closeEditor()" title="Close">✕</button>
                </div>
            </div>
            <div class="modal-body">
                <input type="text" class="note-title-input" id="noteTitle" placeholder="Note Title">
                <textarea class="note-content-textarea" id="noteContent" placeholder="Start typing your note here..."></textarea>
            </div>
            <div class="modal-toolbar">
                <button class="toolbar-btn" title="Bold" onclick="formatText('bold')"><b>B</b></button>
                <button class="toolbar-btn" title="Italic" onclick="formatText('italic')"><i>I</i></button>
                <button class="toolbar-btn" title="Underline" onclick="formatText('underline')"><u>U</u></button>
                <button class="toolbar-btn" title="Checklist" onclick="insertChecklist()">☑️</button>
                <button class="toolbar-btn" title="Favorite" onclick="toggleEditorFavorite()" id="favBtn">⭐</button>
            </div>
        </div>
    </div>

    <script>
        // ===================== SUPABASE CONFIG =====================
        // IMPORTANT: Replace these with your actual Supabase credentials!
        const SUPABASE_URL = 'https://yjizkmrqpmyijsuwdofi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqaXprbXJxcG15aWpzdXdkb2ZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2ODgxNjgsImV4cCI6MjEwMDI2NDE2OH0.B9HAbMsao5yvJIPZNX6_8Kw9r602-lj7dntevMYQPcs'';

        // Initialize Supabase client
        let supabase = null;
        try {
            // The supabase-js library exposes createClient on window.supabase
            if (typeof window !== 'undefined' && window.supabase && window.supabase.createClient) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('Supabase initialized successfully');
            } else if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                console.warn('Supabase library not loaded. Using local storage mode.');
            }
        } catch(e) {
            console.warn('Supabase initialization failed:', e.message);
            console.warn('Using local storage mode.');
        }

        // ===================== STATE =====================
        let notes = [];
        let currentUser = null;
        let isLoggedIn = false;
        let editingNoteId = null;
        let currentFilter = 'all';
        let currentNoteColor = 'yellow';
        let isFavorite = false;

        // ===================== INITIALIZATION =====================
        document.addEventListener('DOMContentLoaded', async () => {
            // Load from localStorage first
            const saved = localStorage.getItem('chameli_notes');
            if (saved) {
                notes = JSON.parse(saved);
                renderNotes();
            }

            // Check for existing Supabase session
            if (supabase) {
                const { data: { user } } = await supabase.auth.getUser();
                if (user) {
                    setUser(user);
                    await loadNotesFromSupabase();
                }

                // Listen for auth changes
                supabase.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_IN' && session) {
                        setUser(session.user);
                        loadNotesFromSupabase();
                    } else if (event === 'SIGNED_OUT') {
                        clearUser();
                    }
                });
            }

            updateCounts();
        });

        // ===================== USER MANAGEMENT =====================
        function setUser(user) {
            currentUser = user;
            isLoggedIn = true;

            const avatar = user.user_metadata?.avatar_url || user.user_metadata?.picture || '';
            const name = user.user_metadata?.user_name || user.user_metadata?.full_name || user.email?.split('@')[0] || 'GitHub User';
            const email = user.email || '';

            document.getElementById('userName').textContent = name;
            document.getElementById('userEmail').textContent = email;
            document.getElementById('loginBtn').textContent = 'Logout';

            const avatarEl = document.getElementById('userAvatar');
            if (avatar) {
                avatarEl.innerHTML = `<img src="${avatar}" alt="avatar">`;
            } else {
                avatarEl.textContent = '👤';
            }

            showToast('Welcome! Notes syncing enabled.');
        }

        function clearUser() {
            currentUser = null;
            isLoggedIn = false;
            document.getElementById('userName').textContent = 'Guest User';
            document.getElementById('userEmail').textContent = 'Login to sync notes';
            document.getElementById('userAvatar').textContent = '👤';
            document.getElementById('loginBtn').textContent = 'Login';
            showToast('Logged out');
        }

        function toggleLogin() {
            if (isLoggedIn) {
                logout();
            } else {
                document.getElementById('loginModal').classList.add('active');
            }
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        async function signInWithGitHub() {
            if (!supabase) {
                showToast('Supabase not connected. Using guest mode.');
                return;
            }

            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'github',
                options: {
                    redirectTo: window.location.origin
                }
            });

            if (error) {
                showToast('Login failed: ' + error.message);
            }
        }

        async function logout() {
            if (supabase) {
                await supabase.auth.signOut();
            }
            clearUser();
        }

        // ===================== NOTE OPERATIONS =====================
        function openEditor(noteId = null) {
            editingNoteId = noteId;
            const modal = document.getElementById('editorModal');
            const titleInput = document.getElementById('noteTitle');
            const contentInput = document.getElementById('noteContent');
            const dateEl = document.getElementById('editorDate');

            if (noteId) {
                const note = notes.find(n => n.id === noteId);
                if (note) {
                    titleInput.value = note.title || '';
                    contentInput.value = note.content || '';
                    dateEl.textContent = note.date || new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    currentNoteColor = note.color || 'yellow';
                    isFavorite = note.favorite || false;
                }
            } else {
                titleInput.value = '';
                contentInput.value = '';
                dateEl.textContent = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                currentNoteColor = 'yellow';
                isFavorite = false;
            }

            updateColorPicker();
            updateFavoriteBtn();
            modal.classList.add('active');
            titleInput.focus();
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
            editingNoteId = null;
        }

        async function saveNote() {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value.trim();

            if (!title && !content) {
                closeEditor();
                return;
            }

            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            if (editingNoteId) {
                const idx = notes.findIndex(n => n.id === editingNoteId);
                if (idx !== -1) {
                    notes[idx] = {
                        ...notes[idx],
                        title: title || 'Untitled',
                        content,
                        color: currentNoteColor,
                        favorite: isFavorite,
                        updated_at: now.toISOString()
                    };
                }
            } else {
                notes.unshift({
                    id: Date.now().toString(),
                    title: title || 'Untitled',
                    content,
                    color: currentNoteColor,
                    favorite: isFavorite,
                    date: dateStr,
                    created_at: now.toISOString(),
                    updated_at: now.toISOString()
                });
            }

            // Save to localStorage
            localStorage.setItem('chameli_notes', JSON.stringify(notes));

            // Save to Supabase if logged in
            if (isLoggedIn && supabase) {
                await saveToSupabase();
            }

            renderNotes();
            updateCounts();
            closeEditor();
            showToast('Note saved!');
        }

        function deleteCurrentNote() {
            if (editingNoteId) {
                if (confirm('Delete this note?')) {
                    notes = notes.filter(n => n.id !== editingNoteId);
                    localStorage.setItem('chameli_notes', JSON.stringify(notes));
                    if (isLoggedIn && supabase) saveToSupabase();
                    renderNotes();
                    updateCounts();
                    closeEditor();
                    showToast('Note deleted');
                }
            } else {
                closeEditor();
            }
        }

        function deleteNote(noteId, event) {
            event.stopPropagation();
            if (confirm('Delete this note?')) {
                notes = notes.filter(n => n.id !== noteId);
                localStorage.setItem('chameli_notes', JSON.stringify(notes));
                if (isLoggedIn && supabase) saveToSupabase();
                renderNotes();
                updateCounts();
                showToast('Note deleted');
            }
        }

        function toggleFavoriteNote(noteId, event) {
            event.stopPropagation();
            const idx = notes.findIndex(n => n.id === noteId);
            if (idx !== -1) {
                notes[idx].favorite = !notes[idx].favorite;
                localStorage.setItem('chameli_notes', JSON.stringify(notes));
                if (isLoggedIn && supabase) saveToSupabase();
                renderNotes();
                updateCounts();
                showToast(notes[idx].favorite ? 'Added to favorites' : 'Removed from favorites');
            }
        }

        function toggleEditorFavorite() {
            isFavorite = !isFavorite;
            updateFavoriteBtn();
        }

        function updateFavoriteBtn() {
            document.getElementById('favBtn').style.opacity = isFavorite ? '1' : '0.3';
        }

        // ===================== RENDERING =====================
        function renderNotes() {
            const container = document.getElementById('notesContainer');
            let filtered = notes;

            if (currentFilter === 'favorites') {
                filtered = notes.filter(n => n.favorite);
            } else if (currentFilter === 'trash') {
                // Implement trash logic if needed
                filtered = [];
            }

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(n => 
                    (n.title || '').toLowerCase().includes(searchTerm) ||
                    (n.content || '').toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📝</div>
                        <h3>${currentFilter === 'favorites' ? 'No favorites yet' : 'No notes yet'}</h3>
                        <p>${currentFilter === 'favorites' ? 'Star some notes to see them here' : 'Click "New Note" to get started'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(note => `
                <div class="note-card ${note.color || 'yellow'}" onclick="openEditor('${note.id}')">
                    <div class="note-card-title">${escapeHtml(note.title || 'Untitled')}</div>
                    <div class="note-card-content">${escapeHtml(note.content || '').substring(0, 120)}${(note.content || '').length > 120 ? '...' : ''}</div>
                    <div class="note-card-footer">
                        <span class="note-card-date">${note.date || ''}</span>
                        <div class="note-card-actions">
                            <button onclick="toggleFavoriteNote('${note.id}', event)" style="opacity: ${note.favorite ? 1 : 0.3}">⭐</button>
                            <button onclick="deleteNote('${note.id}', event)">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateCounts() {
            document.getElementById('allCount').textContent = notes.length;
            document.getElementById('favCount').textContent = notes.filter(n => n.favorite).length;
        }

        function filterNotes(filter) {
            currentFilter = filter;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');

            const titles = { all: 'All Notes', favorites: 'Favorites', trash: 'Trash' };
            document.getElementById('pageTitle').textContent = titles[filter] || 'All Notes';

            renderNotes();
        }

        function searchNotes(term) {
            renderNotes();
        }

        // ===================== COLOR & TOOLBAR =====================
        function setNoteColor(color) {
            currentNoteColor = color;
            updateColorPicker();
        }

        function updateColorPicker() {
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.color === currentNoteColor);
            });
        }

        function formatText(command) {
            const textarea = document.getElementById('noteContent');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end);

            let replacement = selected;
            if (command === 'bold') replacement = `**${selected}**`;
            else if (command === 'italic') replacement = `*${selected}*`;
            else if (command === 'underline') replacement = `__${selected}__`;

            textarea.value = text.substring(0, start) + replacement + text.substring(end);
            textarea.focus();
            textarea.setSelectionRange(start + replacement.length, start + replacement.length);
        }

        function insertChecklist() {
            const textarea = document.getElementById('noteContent');
            const cursorPos = textarea.selectionStart;
            const text = textarea.value;
            const checklist = '\n☐ ';
            textarea.value = text.substring(0, cursorPos) + checklist + text.substring(cursorPos);
            textarea.focus();
            textarea.setSelectionRange(cursorPos + checklist.length, cursorPos + checklist.length);
        }

        // ===================== SUPABASE INTEGRATION =====================
        async function saveToSupabase() {
            if (!supabase || !currentUser) {
                console.log('Skipping Supabase save - not connected');
                return;
            }

            try {
                // Upsert notes to Supabase
                for (const note of notes) {
                    const { error } = await supabase
                        .from('notes')
                        .upsert({
                            id: note.id,
                            user_id: currentUser.id,
                            title: note.title,
                            content: note.content,
                            color: note.color,
                            favorite: note.favorite,
                            created_at: note.created_at,
                            updated_at: note.updated_at
                        }, { onConflict: 'id' });

                    if (error) console.error('Save error:', error);
                }
            } catch (e) {
                console.error('Supabase save failed:', e);
            }
        }

        async function loadNotesFromSupabase() {
            if (!supabase || !currentUser) {
                console.log('Skipping Supabase load - not connected');
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('notes')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('updated_at', { ascending: false });

                if (error) {
                    console.error('Load error:', error);
                    return;
                }

                if (data && data.length > 0) {
                    // Merge with local notes (Supabase takes priority)
                    const localIds = new Set(notes.map(n => n.id));
                    const merged = [...notes];

                    for (const remoteNote of data) {
                        const idx = merged.findIndex(n => n.id === remoteNote.id);
                        if (idx !== -1) {
                            merged[idx] = { ...remoteNote, date: new Date(remoteNote.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) };
                        } else {
                            merged.push({
                                ...remoteNote,
                                date: new Date(remoteNote.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                            });
                        }
                    }

                    notes = merged;
                    localStorage.setItem('chameli_notes', JSON.stringify(notes));
                    renderNotes();
                    updateCounts();
                    showToast('Notes synced from cloud!');
                }
            } catch (e) {
                console.error('Supabase load failed:', e);
            }
        }

        // ===================== UTILITIES =====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // Close modals on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeEditor();
                closeLoginModal();
            }
            // Ctrl/Cmd + S to save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (document.getElementById('editorModal').classList.contains('active')) {
                    saveNote();
                }
            }
        });

        // Auto-resize textarea
        document.getElementById('noteContent').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.max(300, this.scrollHeight) + 'px';
        });
    </script>
</body>
